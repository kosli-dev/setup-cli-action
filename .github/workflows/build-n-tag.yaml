name: Build and Tag

# Triggered when a GitHub Release is published or edited.
# Builds dist/ and force-pushes it onto the release's tag.
# For full releases, also updates the rolling major/minor refs (v2 and v2.1).
# build-and-tag-action automatically skips ref updates for prereleases and drafts.
on:
  release:
    types: [published, edited]

permissions:
  contents: write

jobs:
  build-and-tag:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: 24
          cache: npm

      - name: Install deps and build
        run: npm ci && npm run build

      - name: Build and tag (force-pushes dist/ to the tag and updates major/minor refs)
        uses: JasonEtco/build-and-tag-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
